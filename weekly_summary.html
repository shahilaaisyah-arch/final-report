<!DOCTYPE html>

<style>

  /* NAVBAR */

nav{
background:#D1B399;
padding:15px;
text-align:center;
position:relative;
}

.nav-links{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.nav-links a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
position:relative;
}

/* hover effect */
.nav-links a::after{
content:"";
width:0%;
height:2px;
background:white;
position:absolute;
left:0;
bottom:-4px;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

/* hamburger */

.menu-toggle{
display:none;
font-size:22px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media (max-width:768px){

.menu-toggle{
display:block;
}

.nav-links{
display:none;
flex-direction:column;
margin-top:10px;
animation:fadeIn 0.3s ease;
}

.nav-links a{
margin:10px 0;
font-size:15px;
}

.nav-links.active{
display:flex;
}

}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
  
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Times New Roman", Times, serif;
background:#f4f4f4;
color:black;
}

.header{
background:#D1B399;
color:black;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
}

nav{
background:#D1B399;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

.container{
max-width:950px;
margin:40px auto;
padding:30px;
background:#E3DFD2;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:25px;
}
  
.week-buttons{
display:grid;
grid-template-columns:repeat(11,1fr);
gap:8px;
margin-bottom:25px;
}

.week-btn{
padding:10px;
border:none;
background:#B0B7AB;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.week-btn:hover{
background:#9EA596;
transform:scale(1.05);
}

.week-content{
display:none;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-top:10px;
}

.week-content h2{
margin-bottom:10px;
}

footer{
background:#D1B399;
color:black;
text-align:center;
padding:12px;
margin-top:40px;
}
