<title>Industrial Training Report - Weekly Summary</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Times New Roman", Times, serif;
background:#f4f4f4;
color:black;
}

.header{
background:#D1B399;
color:black;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
}

nav{

padding:10px;

}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

.container{
max-width:950px;
margin:40px auto;
padding:30px;
background:#E3DFD2;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

margin-bottom:25px;
}
  
.week-buttons{
display:grid;
grid-template-columns:repeat(11,1fr);
gap:8px;
margin-bottom:25px;
}

.week-btn{
padding:10px;
border:none;
background:#B0B7AB;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.week-btn:hover{
background:#9EA596;
transform:scale(1.05);
}

.week-content{
display:none;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.week-content h2{
margin-bottom:10px;

footer{

panel.style.display="block";

panel.innerHTML=

}

</script>
